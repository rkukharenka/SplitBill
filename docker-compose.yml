# Local development: only PostgreSQL + Redis
# App runs separately: ./gradlew bootRun --args='--spring.profiles.active=local'
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: splitbill
      POSTGRES_USER: splitbill
      POSTGRES_PASSWORD: splitbill
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitbill -d splitbill"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
